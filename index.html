<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏃 TEMPLE FURY - Street Chase Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      position: fixed;
      top: 0;
      left: 0;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      touch-action: none;
    }

    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      background: rgba(0,0,0,0.75);
    }
    .menu-panel {
      background: rgba(10,10,30,0.95);
      backdrop-filter: blur(25px);
      border: 2px solid #d4af37;
      border-radius: 25px;
      padding: 35px 25px;
      text-align: center;
      color: #ffd700;
      box-shadow: 0 0 80px rgba(255,140,0,0.6), inset 0 0 40px rgba(255,200,0,0.15);
      min-width: 300px;
      max-width: 420px;
      width: 90%;
    }
    .menu-title {
      font-size: 2rem;
      font-weight: 900;
      text-shadow: 0 0 40px #ff8c00, 0 0 80px #ff4500;
      margin-bottom: 5px;
      letter-spacing: 3px;
    }
    .menu-subtitle {
      color: #ffaa33;
      font-size: 0.85rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }
    .menu-btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      margin: 7px 0;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
      text-transform: uppercase;
      position: relative;
      z-index: 101;
    }
    .btn-play {
      background: linear-gradient(180deg, #ffd700, #e6a817);
      color: #1a1a1a !important;
      border: 2px solid #ffe44d;
      box-shadow: 0 0 40px rgba(255,140,0,0.8);
      font-size: 1.3rem !important;
      padding: 16px 20px !important;
    }
    .btn-play:active { transform: scale(0.95); }
    .btn-settings {
      background: rgba(255,255,255,0.1);
      border: 2px solid #8b6914;
      color: #ffd700 !important;
    }
    .btn-achievements {
      background: rgba(100,200,255,0.15);
      border: 2px solid #0088cc;
      color: #00d4ff !important;
    }
    .btn-back {
      background: rgba(255,255,255,0.08);
      border: 2px solid #666;
      color: #ccc !important;
      margin-top: 15px;
    }
    .btn-quit {
      background: rgba(255,50,50,0.15);
      border: 2px solid #cc0000;
      color: #ff6666 !important;
    }
    .high-score {
      color: #ffaa33;
      font-size: 1rem;
      margin-top: 12px;
      text-shadow: 0 0 15px #ff8c00;
    }
    .settings-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin: 5px 0;
      color: #ddd;
    }
    .toggle-btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid #8b6914;
      color: #ffd700;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .achievement-item {
      margin: 6px 0;
      padding: 10px;
      border-radius: 10px;
      text-align: left;
      color: #ccc;
      font-size: 0.85rem;
    }
    .achievement-unlocked {
      background: rgba(0,255,0,0.15);
      border: 1px solid rgba(0,255,0,0.3);
    }
    .achievement-locked {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .scrollable {
      max-height: 50vh;
      overflow-y: auto;
      margin: 10px 0;
    }

    .ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 10;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 6px;
    }
    .hud-item {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(15px);
      padding: 8px 16px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 0.95rem;
      letter-spacing: 1px;
      pointer-events: auto;
      color: #ffd700;
    }
    .score-panel { border: 2px solid #d4af37; box-shadow: 0 0 25px rgba(255,140,0,0.7); }
    .speed-panel { background: rgba(200,40,10,0.85); border: 2px solid #ff5733; color: #fff; }
    .combo-panel { background: rgba(150,0,255,0.8); border: 2px solid #cc44ff; color: #fff; display: none; }
    .hud-btn {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 2px solid #d4af37;
      color: #ffd700;
      font-size: 0.95rem;
      padding: 8px 14px;
      border-radius: 50px;
      cursor: pointer;
      pointer-events: auto;
      font-weight: bold;
    }
    .instructions {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      color: #c9a96b;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 0.75rem;
      letter-spacing: 1px;
      z-index: 10;
      pointer-events: none;
      border: 1px solid #8b6914;
      white-space: nowrap;
    }
    .achievement-popup {
      position: fixed;
      top: 80px;
      right: 15px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(15px);
      border: 2px solid #ffd700;
      border-radius: 20px;
      padding: 15px 20px;
      color: #ffd700;
      font-weight: bold;
      z-index: 200;
      animation: slideIn 0.5s ease, slideOut 0.5s ease 2.5s forwards;
      pointer-events: none;
      box-shadow: 0 0 30px rgba(255,200,0,0.6);
      max-width: 250px;
    }
    @keyframes slideIn {
      from { transform: translateX(200px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(200px); opacity: 0; }
    }

    @media (max-width: 600px) {
      .menu-panel { padding: 25px 18px; min-width: 260px; }
      .menu-title { font-size: 1.5rem; }
      .menu-btn { padding: 12px 16px; font-size: 1rem; }
      .btn-play { font-size: 1.1rem !important; padding: 14px 16px !important; }
      .hud-item { font-size: 0.8rem; padding: 6px 12px; }
      .hud-btn { font-size: 0.8rem; padding: 6px 10px; }
      .instructions { font-size: 0.65rem; padding: 6px 12px; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- MAIN MENU -->
  <div class="menu-overlay" id="mainMenu">
    <div class="menu-panel">
      <div class="menu-title">🏃 TEMPLE FURY</div>
      <div class="menu-subtitle">⚡ Street Chase - Dodge The Cars! ⚡</div>
      <button class="menu-btn btn-play" id="playButton">▶ PLAY</button>
      <button class="menu-btn btn-settings" id="openSettingsBtn">⚙ SETTINGS</button>
      <button class="menu-btn btn-achievements" id="openAchievementsBtn">🏆 ACHIEVEMENTS</button>
      <div class="high-score">👑 Best Score: <span id="menuHighScore">0</span></div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="menu-overlay" id="settingsPanel" style="display:none;">
    <div class="menu-panel">
      <div class="menu-title">⚙ SETTINGS</div>
      <div class="settings-item"><span>🔊 Sound Effects</span><button class="toggle-btn" id="toggleSoundBtn">ON</button></div>
      <div class="settings-item"><span>🎵 Music</span><button class="toggle-btn" id="toggleMusicBtn">ON</button></div>
      <div class="settings-item"><span>✨ Visual Effects</span><button class="toggle-btn" id="toggleEffectsBtn">ON</button></div>
      <button class="menu-btn btn-back" id="backFromSettings">⬅ BACK TO MENU</button>
    </div>
  </div>

  <!-- ACHIEVEMENTS -->
  <div class="menu-overlay" id="achievementsPanel" style="display:none;">
    <div class="menu-panel">
      <div class="menu-title">🏆 ACHIEVEMENTS</div>
      <div class="scrollable" id="achievementsList"></div>
      <button class="menu-btn btn-back" id="backFromAchievements">⬅ BACK TO MENU</button>
    </div>
  </div>

  <!-- HUD -->
  <div class="ui-overlay" id="gameHUD" style="display:none;">
    <div class="hud-item score-panel">💰 <span id="scoreDisplay">0</span></div>
    <div class="hud-item speed-panel">⚡ <span id="speedDisplay">1.0x</span></div>
    <div class="hud-item combo-panel" id="comboPanel">🔥 <span id="comboDisplay">x1</span></div>
    <button class="hud-btn" id="pauseButton">⏸</button>
    <button class="hud-btn" id="soundButton">🔊</button>
    <button class="hud-btn" id="restartButton">🔄</button>
  </div>
  <div class="instructions" id="gameInstructions" style="display:none;">
    ⬅️➡️ Switch Lanes | ⬆️ Jump Over Cars | ⬇️ Slide Under | SPACE Pause
  </div>

  <!-- PAUSE -->
  <div class="menu-overlay" id="pauseOverlay" style="display:none;">
    <div class="menu-panel">
      <div class="menu-title">⏸ PAUSED</div>
      <button class="menu-btn btn-play" id="resumeButton">▶ RESUME</button>
      <button class="menu-btn btn-settings" id="restartFromPause">🔄 RESTART</button>
      <button class="menu-btn btn-quit" id="quitToMenu">🏠 MAIN MENU</button>
    </div>
  </div>

  <div id="achievementPopupContainer"></div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // ============ AUDIO SYSTEM ============
  let audioCtx = null;
  let soundEnabled = true;
  let musicEnabled = true;
  let effectsEnabled = true;
  let masterGain = null, musicGain = null, sfxGain = null;
  let musicOscillators = [];

  function initAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.gain.value = 0.4; masterGain.connect(audioCtx.destination);
        musicGain = audioCtx.createGain(); musicGain.gain.value = 0.12; musicGain.connect(masterGain);
        sfxGain = audioCtx.createGain(); sfxGain.gain.value = 0.5; sfxGain.connect(masterGain);
      } catch(e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function stopMusic() {
    musicOscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
    musicOscillators = [];
  }

  function startMusic() {
    if (!musicEnabled || !audioCtx) return;
    stopMusic();
    const notes = [130.81, 164.81, 196, 220, 261.63, 329.63, 392];
    let noteIndex = 0;
    function playNextNote() {
      if (!musicEnabled || !audioCtx || gameState !== 'playing') return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = notes[noteIndex % notes.length];
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.connect(gain); gain.connect(musicGain);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      musicOscillators.push(osc);
      noteIndex++;
      if (musicEnabled && gameState === 'playing') setTimeout(playNextNote, 250);
    }
    playNextNote();
  }

  function playSFX(type) {
    if (!soundEnabled || !effectsEnabled || !audioCtx) return;
    const now = audioCtx.currentTime;
    try {
      let osc, gain;
      switch(type) {
        case 'jump':
          osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
          osc.type = 'sine'; osc.frequency.setValueAtTime(300, now);
          osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
          gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
          osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.18);
          break;
        case 'coin':
          osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
          osc.type = 'triangle'; osc.frequency.setValueAtTime(1000, now);
          osc.frequency.exponentialRampToValueAtTime(1500, now + 0.06);
          gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.1);
          break;
        case 'shield':
          osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, now);
          osc.frequency.exponentialRampToValueAtTime(1000, now + 0.2);
          gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
          osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.25);
          break;
        case 'death':
          osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
          osc.type = 'square'; osc.frequency.setValueAtTime(200, now);
          osc.frequency.exponentialRampToValueAtTime(30, now + 0.6);
          gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
          osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.6);
          break;
        case 'slide':
          osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
          osc.frequency.linearRampToValueAtTime(60, now + 0.12);
          gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
          osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.12);
          break;
        case 'horn':
          osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
          osc.type = 'square'; osc.frequency.setValueAtTime(180, now);
          osc.frequency.setValueAtTime(200, now + 0.1);
          gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
          osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.2);
          break;
      }
    } catch(e) {}
  }

  let lastFootstepTime = 0;
  function playFootstepSound() {
    if (!soundEnabled || !effectsEnabled || !audioCtx) return;
    const now = audioCtx.currentTime;
    if (now - lastFootstepTime < 0.1) return;
    lastFootstepTime = now;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square'; osc.frequency.setValueAtTime(60, now);
      gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.03);
      osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.03);
    } catch(e) {}
  }

  // ============ GAME STATE ============
  let gameState = 'menu';
  let W, H;
  let lanes;
  let playerLaneIndex = 1;
  
  const player = {
    width: 28, height: 48, x: 0, y: 0,
    velY: 0, grounded: true, sliding: false,
    normalHeight: 48, slideHeight: 24,
    runFrame: 0, armSwing: 0, wasSliding: false,
  };

  let obstacles = []; // Cars and barriers
  let coins = [];
  let shields = [];
  let powerUps = [];
  let particles = [];
  let activeShield = false;
  let shieldTimer = 0;
  let activePowerUp = null;
  let powerUpTimer = 0;

  let baseSpeed = 6.5;
  let currentSpeed = baseSpeed;
  let score = 0;
  let distance = 0;
  let difficultyLevel = 1;
  let comboCount = 0;
  let comboTimer = 0;
  let maxCombo = 0;

  let keys = { left: false, right: false, up: false, down: false };
  let laneCooldown = 0;
  const LANE_COOLDOWN_TIME = 5;

  let achievements = {
    firstRun: false, coinCollector: false, speedDemon: false,
    survivor: false, shieldMaster: false, comboKing: false, carJumper: false,
  };
  let highScore = 0;
  let carsJumped = 0;
  try { highScore = parseInt(localStorage.getItem('templeFuryHighScore') || '0'); } catch(e) { highScore = 0; }

  let gameLoopId = null;

  // ============ UI ELEMENTS ============
  const mainMenu = document.getElementById('mainMenu');
  const settingsPanel = document.getElementById('settingsPanel');
  const achievementsPanel = document.getElementById('achievementsPanel');
  const gameHUD = document.getElementById('gameHUD');
  const gameInstructions = document.getElementById('gameInstructions');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const scoreSpan = document.getElementById('scoreDisplay');
  const speedDisplay = document.getElementById('speedDisplay');
  const comboPanel = document.getElementById('comboPanel');
  const comboDisplay = document.getElementById('comboDisplay');
  const menuHighScore = document.getElementById('menuHighScore');

  // ============ FUNCTIONS ============
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function updateDimensions() { W = canvas.width; H = canvas.height; }
  function calculateLanes() { lanes = [W * 0.2, W * 0.5, W * 0.8]; }

  function showAchievement(name, description) {
    const container = document.getElementById('achievementPopupContainer');
    const popup = document.createElement('div');
    popup.className = 'achievement-popup';
    popup.innerHTML = `🏆 <strong>${name}</strong><br><small>${description}</small>`;
    container.appendChild(popup);
    setTimeout(() => { if (popup.parentNode) popup.remove(); }, 3000);
    playSFX('shield');
  }

  function checkAchievements() {
    if (!achievements.firstRun && score >= 100) { achievements.firstRun = true; showAchievement('First Steps', 'Score 100 points!'); }
    if (!achievements.coinCollector && score >= 500) { achievements.coinCollector = true; showAchievement('Coin Collector', 'Score 500 points!'); }
    if (!achievements.speedDemon && currentSpeed >= 12) { achievements.speedDemon = true; showAchievement('Speed Demon', 'Reach 12x speed!'); }
    if (!achievements.survivor && score >= 2000) { achievements.survivor = true; showAchievement('Survivor', 'Score 2000 points!'); }
    if (!achievements.shieldMaster && activeShield && shieldTimer > 150) { achievements.shieldMaster = true; showAchievement('Shield Master', 'Hold shield for 150+ frames!'); }
    if (!achievements.comboKing && maxCombo >= 10) { achievements.comboKing = true; showAchievement('Combo King', 'Reach 10x combo!'); }
    if (!achievements.carJumper && carsJumped >= 20) { achievements.carJumper = true; showAchievement('Car Jumper', 'Jump over 20 cars!'); }
  }

  function updateAchievementsList() {
    const list = document.getElementById('achievementsList');
    if (!list) return;
    const all = [
      { key: 'firstRun', name: 'First Steps', desc: 'Score 100 points', icon: '🌟' },
      { key: 'coinCollector', name: 'Coin Collector', desc: 'Score 500 points', icon: '💰' },
      { key: 'speedDemon', name: 'Speed Demon', desc: 'Reach 12x speed', icon: '⚡' },
      { key: 'survivor', name: 'Survivor', desc: 'Score 2000 points', icon: '🛡️' },
      { key: 'shieldMaster', name: 'Shield Master', desc: 'Hold shield 150+ frames', icon: '🔮' },
      { key: 'comboKing', name: 'Combo King', desc: 'Reach 10x combo', icon: '🔥' },
      { key: 'carJumper', name: 'Car Jumper', desc: 'Jump over 20 cars', icon: '🚗' },
    ];
    list.innerHTML = all.map(a => 
      `<div class="achievement-item ${achievements[a.key] ? 'achievement-unlocked' : 'achievement-locked'}">
        ${a.icon} ${achievements[a.key] ? '✅' : '🔒'} <strong>${a.name}</strong><br><small>${a.desc}</small>
      </div>`
    ).join('');
  }

  function showPanel(panel) {
    mainMenu.style.display = 'none'; mainMenu.classList.remove('active');
    settingsPanel.style.display = 'none'; achievementsPanel.style.display = 'none';
    pauseOverlay.style.display = 'none';
    
    if (panel === 'menu') {
      mainMenu.style.display = 'flex'; mainMenu.classList.add('active');
      menuHighScore.textContent = highScore;
    } else if (panel === 'settings') {
      settingsPanel.style.display = 'flex';
    } else if (panel === 'achievements') {
      achievementsPanel.style.display = 'flex';
      updateAchievementsList();
    } else if (panel === 'pause') {
      pauseOverlay.style.display = 'flex';
    }
  }

  function startGame() {
    initAudio();
    updateDimensions(); calculateLanes();
    playerLaneIndex = 1; player.x = lanes[1]; player.y = H * 0.72;
    player.velY = 0; player.grounded = true; player.sliding = false;
    player.height = player.normalHeight; player.runFrame = 0; player.armSwing = 0; player.wasSliding = false;
    obstacles = []; coins = []; shields = []; powerUps = []; particles = [];
    activeShield = false; shieldTimer = 0; activePowerUp = null; powerUpTimer = 0;
    score = 0; distance = 0; baseSpeed = 6.5; currentSpeed = baseSpeed;
    difficultyLevel = 1; comboCount = 0; comboTimer = 0; maxCombo = 0;
    carsJumped = 0; laneCooldown = 0;
    keys = { left: false, right: false, up: false, down: false };
    
    gameState = 'playing';
    mainMenu.style.display = 'none'; mainMenu.classList.remove('active');
    settingsPanel.style.display = 'none'; achievementsPanel.style.display = 'none';
    pauseOverlay.style.display = 'none';
    gameHUD.style.display = 'flex'; gameInstructions.style.display = 'block';
    updateUI();
    if (musicEnabled) startMusic();
  }

  function pauseGame() {
    if (gameState !== 'playing') return;
    gameState = 'paused'; showPanel('pause'); stopMusic();
  }

  function resumeGame() {
    if (gameState !== 'paused') return;
    gameState = 'playing'; pauseOverlay.style.display = 'none';
    if (musicEnabled) startMusic();
  }

  function quitToMenu() {
    gameState = 'menu'; stopMusic();
    pauseOverlay.style.display = 'none'; gameHUD.style.display = 'none';
    gameInstructions.style.display = 'none'; showPanel('menu');
    menuHighScore.textContent = highScore; updateAchievementsList();
  }

  function restartGame() {
    stopMusic();
    if (score > highScore) {
      highScore = Math.floor(score);
      try { localStorage.setItem('templeFuryHighScore', highScore); } catch(e) {}
    }
    startGame();
  }

  function updateUI() {
    scoreSpan.textContent = Math.floor(score);
    let mult = (currentSpeed / 6.5).toFixed(1);
    speedDisplay.innerHTML = `⚡ ${mult}x ${activeShield ? '🛡️' : ''} ${activePowerUp ? '💎' : ''}`;
    menuHighScore.textContent = highScore;
    if (comboCount > 1) { comboPanel.style.display = 'block'; comboDisplay.textContent = `x${comboCount}`; }
    else { comboPanel.style.display = 'none'; }
  }

  // SPAWN CAR (motoci)
  function spawnCar() {
    const availableLanes = [0, 1, 2].filter(laneIdx => {
      return !obstacles.some(obs => obs.lane === laneIdx && obs.y > -120 && obs.y < 100);
    });
    if (availableLanes.length === 0) return;
    
    const laneIdx = availableLanes[Math.floor(Math.random() * availableLanes.length)];
    const carColors = ['#e63946', '#1d3557', '#2a9d8f', '#e9c46a', '#f4a261', '#264653', '#ff6b6b', '#4ecdc4'];
    const carColor = carColors[Math.floor(Math.random() * carColors.length)];
    
    obstacles.push({
      lane: laneIdx, x: lanes[laneIdx], y: -80,
      width: 44, height: 75, type: 'car', color: carColor,
      wheelRot: 0, jumped: false,
    });
  }

  function spawnCoin() {
    const availableLanes = [0, 1, 2].filter(laneIdx => {
      return !coins.some(c => c.lane === laneIdx && c.y > -60 && c.y < 60);
    });
    if (availableLanes.length === 0) return;
    const laneIdx = availableLanes[Math.floor(Math.random() * availableLanes.length)];
    coins.push({ lane: laneIdx, x: lanes[laneIdx], y: -30, radius: 11, collected: false, sparkle: Math.random() * Math.PI * 2 });
  }

  function spawnShield() {
    if (shields.length > 0 || activeShield) return;
    const laneIdx = Math.floor(Math.random() * 3);
    shields.push({ lane: laneIdx, x: lanes[laneIdx], y: -40, radius: 14, collected: false });
  }

  function spawnPowerUp() {
    if (powerUps.length > 0 || activePowerUp) return;
    const types = ['magnet', 'speedBoost', 'invincibility', 'doubleScore'];
    const type = types[Math.floor(Math.random() * types.length)];
    const laneIdx = Math.floor(Math.random() * 3);
    powerUps.push({ lane: laneIdx, x: lanes[laneIdx], y: -50, radius: 13, collected: false, type: type });
  }

  function addParticles(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6 - 3,
        life: 1, color, size: Math.random() * 4 + 1,
      });
    }
  }

  function handleCollision() {
    if (activeShield || activePowerUp === 'invincibility') {
      if (activeShield) { activeShield = false; shieldTimer = 0; playSFX('shieldBreak'); addParticles(player.x, player.y, '#00bfff', 15); }
      if (activePowerUp === 'invincibility') { addParticles(player.x, player.y, '#ffff00', 10); }
      obstacles = obstacles.filter(o => { const dist = Math.hypot(player.x - o.x, player.y - o.y); return dist > 120; });
      comboCount = 0; updateUI(); return;
    }
    gameState = 'gameover'; stopMusic(); playSFX('death');
    addParticles(player.x, player.y, '#ff0000', 25);
    if (score > highScore) {
      highScore = Math.floor(score);
      try { localStorage.setItem('templeFuryHighScore', highScore); } catch(e) {}
      showAchievement('New High Score!', `🏆 ${highScore} points!`);
    }
    updateUI();
  }

  function rectCollide(r1, r2) {
    const margin = 3;
    return r1.x + margin < r2.x + r2.w - margin &&
           r1.x + r1.w - margin > r2.x + margin &&
           r1.y + margin < r2.y + r2.h - margin &&
           r1.y + r1.h - margin > r2.y + margin;
  }

  // ============ UPDATE ============
  function update() {
    if (gameState !== 'playing') return;
    updateDimensions(); calculateLanes();
    
    distance += currentSpeed;
    if (distance > 300) {
      baseSpeed = Math.min(baseSpeed + 0.18, 22.0);
      distance = 0; difficultyLevel = Math.floor(baseSpeed / 2);
    }
    currentSpeed = activePowerUp === 'speedBoost' ? baseSpeed * 1.5 : baseSpeed;

    player.runFrame += currentSpeed * 0.3;
    player.armSwing = Math.sin(player.runFrame * 0.4) * 0.8;

    if (player.grounded && !player.sliding) playFootstepSound();
    if (player.sliding && !player.wasSliding) { playSFX('slide'); addParticles(player.x, player.y, '#ffffff', 6); }
    player.wasSliding = player.sliding;

    if (comboCount > 1) { comboTimer--; if (comboTimer <= 0) comboCount = 0; }
    if (activePowerUp) { powerUpTimer--; if (powerUpTimer <= 0) activePowerUp = null; }
    if (laneCooldown > 0) laneCooldown--;

    if (laneCooldown <= 0) {
      if (keys.left && playerLaneIndex > 0) { playerLaneIndex--; laneCooldown = LANE_COOLDOWN_TIME; keys.left = false; }
      if (keys.right && playerLaneIndex < 2) { playerLaneIndex++; laneCooldown = LANE_COOLDOWN_TIME; keys.right = false; }
    }

    const targetX = lanes[playerLaneIndex];
    player.x += (targetX - player.x) * 0.4;

    if (keys.up && player.grounded && !player.sliding) {
      player.velY = -10.5; player.grounded = false; playSFX('jump'); keys.up = false;
    }

    if (keys.down && player.grounded) { player.sliding = true; player.height = player.slideHeight; }
    else if (!keys.down && player.sliding && player.grounded) { player.sliding = false; player.height = player.normalHeight; player.wasSliding = false; }

    if (!player.grounded) {
      player.velY += 0.7; player.y += player.velY;
      if (player.y >= H * 0.72) {
        player.y = H * 0.72; player.velY = 0; player.grounded = true;
        if (keys.down) { player.sliding = true; player.height = player.slideHeight; }
        else { player.sliding = false; player.height = player.normalHeight; }
      }
    }

    if (activeShield) { shieldTimer--; if (shieldTimer <= 0) activeShield = false; }

    // Update particles
    for (let p of particles) { p.x += p.vx; p.y += p.vy; p.life -= 0.04; }
    particles = particles.filter(p => p.life > 0);

    // Move objects
    for (let obs of obstacles) { obs.y += currentSpeed; if (obs.type === 'car') obs.wheelRot += currentSpeed * 0.08; }
    for (let coin of coins) { coin.y += currentSpeed; coin.sparkle += 0.1; }
    for (let shield of shields) shield.y += currentSpeed;
    for (let pu of powerUps) pu.y += currentSpeed;

    // Spawning
    if (Math.random() < 0.018 * (1 + difficultyLevel * 0.4)) { if (obstacles.length < 4) spawnCar(); }
    if (Math.random() < 0.05 && coins.length < 8) spawnCoin();
    if (Math.random() < 0.003 && !activeShield && shields.length === 0) spawnShield();
    if (Math.random() < 0.0015 && powerUps.length === 0 && !activePowerUp) spawnPowerUp();

    // Car horn sound
    for (let obs of obstacles) {
      if (obs.type === 'car' && obs.y > H * 0.4 && obs.y < H * 0.45 && Math.random() < 0.02) {
        playSFX('horn');
      }
    }

    // Cleanup
    obstacles = obstacles.filter(o => o.y < H + 150);
    coins = coins.filter(c => c.y < H + 80 && !c.collected);
    shields = shields.filter(s => s.y < H + 80 && !s.collected);
    powerUps = powerUps.filter(p => p.y < H + 80 && !p.collected);

    // Collision detection
    const playerRect = {
      x: player.x - player.width/2,
      y: player.y - player.height + (player.sliding ? 2 : 0),
      w: player.width, h: player.height,
    };

    for (let obs of obstacles) {
      let obsRect = { x: obs.x - obs.width/2, y: obs.y - obs.height, w: obs.width, h: obs.height };
      
      // Check if player is jumping OVER the car
      const playerBottom = player.y;
      const carTop = obs.y - obs.height;
      const isAboveCar = player.grounded === false && playerBottom < carTop;
      
      if (isAboveCar && !obs.jumped) {
        // Player jumped over the car!
        obs.jumped = true;
        carsJumped++;
        score += 50;
        comboCount = Math.min(comboCount + 2, 50);
        comboTimer = 60;
        if (comboCount > maxCombo) maxCombo = comboCount;
        playSFX('coin');
        addParticles(player.x, player.y - 20, '#00ff88', 10);
        updateUI();
        continue;
      }

      // Check if player is sliding UNDER the car
      const isSlidingUnder = player.sliding && player.grounded;
      
      if (isSlidingUnder) {
        // Sliding under - safe!
        continue;
      }

      // Normal collision check
      if (rectCollide(playerRect, obsRect)) {
        handleCollision(); break;
      }
    }

    // Coin collection
    const magnetRange = activePowerUp === 'magnet' ? 160 : 20;
    for (let coin of coins) {
      if (coin.collected) continue;
      const dist = Math.hypot(player.x - coin.x, (player.y - player.height/2) - coin.y);
      if (dist < 11 + magnetRange) {
        coin.collected = true;
        score += activePowerUp === 'doubleScore' ? 50 : 25;
        comboCount = Math.min(comboCount + 1, 50); comboTimer = 60;
        if (comboCount > maxCombo) maxCombo = comboCount;
        playSFX('coin'); addParticles(coin.x, coin.y, '#ffd700', 4); updateUI();
      }
    }

    // Shield collection
    for (let shield of shields) {
      if (shield.collected) continue;
      const dist = Math.hypot(player.x - shield.x, (player.y - player.height/2) - shield.y);
      if (dist < shield.radius + 18) {
        shield.collected = true; activeShield = true; shieldTimer = 300;
        playSFX('shield'); addParticles(shield.x, shield.y, '#00bfff', 10); updateUI();
      }
    }

    // Power-up collection
    for (let pu of powerUps) {
      if (pu.collected) continue;
      const dist = Math.hypot(player.x - pu.x, (player.y - player.height/2) - pu.y);
      if (dist < pu.radius + 18) {
        pu.collected = true; activePowerUp = pu.type; powerUpTimer = 350;
        playSFX('shield'); addParticles(pu.x, pu.y, '#ff00ff', 12); updateUI();
      }
    }

    score += currentSpeed * 0.12;
    checkAchievements();
    updateUI();
  }

  // ============ DRAWING ============
  function drawCar(x, y, width, height, color, wheelRot) {
    ctx.save();
    ctx.translate(x, y - height/2);
    ctx.shadowColor = '#000'; ctx.shadowBlur = 15;
    
    // Car body
    const bodyGrad = ctx.createLinearGradient(0, -height/2, 0, height/2);
    bodyGrad.addColorStop(0, color); bodyGrad.addColorStop(0.5, color); bodyGrad.addColorStop(1, '#000');
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-width/2, -height/2, width, height);
    
    // Car roof
    ctx.fillStyle = '#333';
    ctx.fillRect(-width/3, -height/2 - 12, width * 0.65, 18);
    
    // Windows
    ctx.fillStyle = '#aaddff';
    ctx.fillRect(-width/4 + 2, -height/2 - 9, width/2 - 6, 10);
    
    // Headlights (front - facing player)
    ctx.fillStyle = '#ffff88';
    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 15;
    ctx.fillRect(-width/2 + 4, height/2 - 8, 8, 6);
    ctx.fillRect(width/2 - 12, height/2 - 8, 8, 6);
    
    // Taillights
    ctx.fillStyle = '#ff3333';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10;
    ctx.fillRect(-width/2 + 4, -height/2 + 2, 8, 5);
    ctx.fillRect(width/2 - 12, -height/2 + 2, 8, 5);
    
    // Wheels
    ctx.shadowBlur = 5;
    const wheelPositions = [
      { x: -width/2 + 8, y: -height/2 + 10 },
      { x: width/2 - 8, y: -height/2 + 10 },
      { x: -width/2 + 8, y: height/2 - 10 },
      { x: width/2 - 8, y: height/2 - 10 },
    ];
    
    for (let wp of wheelPositions) {
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(wp.x, wp.y, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#444';
      ctx.beginPath(); ctx.arc(wp.x, wp.y, 4, 0, Math.PI*2); ctx.fill();
      // Wheel spoke
      ctx.strokeStyle = '#666'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wp.x, wp.y);
      ctx.lineTo(wp.x + Math.cos(wheelRot) * 4, wp.y + Math.sin(wheelRot) * 4);
      ctx.stroke();
    }
    
    ctx.restore();
  }

  function drawHuman(x, y, sliding, grounded, armSwing, runFrame) {
    ctx.save();
    ctx.translate(x, y);
    ctx.shadowColor = '#000'; ctx.shadowBlur = 8;

    if (sliding) {
      // Sliding under cars
      ctx.fillStyle = '#e85d2c';
      ctx.beginPath(); ctx.ellipse(0, -2, 15, 8, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#e8b88a'; ctx.beginPath(); ctx.arc(-12, -4, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-14, -6, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2d5a1e'; ctx.fillRect(4, -8, 10, 5); ctx.fillRect(4, 1, 10, 5);
      ctx.fillStyle = '#4a3520'; ctx.fillRect(13, -9, 5, 6); ctx.fillRect(13, 0, 5, 6);
    } else if (!grounded) {
      // Jumping over cars
      ctx.fillStyle = '#2d5a1e'; ctx.fillRect(-8, -4, 7, 10); ctx.fillRect(3, -4, 7, 10);
      ctx.fillStyle = '#4a3520'; ctx.fillRect(-10, 4, 8, 5); ctx.fillRect(2, 4, 8, 5);
      const bg = ctx.createLinearGradient(0, -15, 0, 0);
      bg.addColorStop(0, '#e85d2c'); bg.addColorStop(1, '#8b2500');
      ctx.fillStyle = bg; ctx.beginPath(); ctx.ellipse(0, -10, 10, 13, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#e8b88a';
      ctx.save(); ctx.translate(-8, -16); ctx.rotate(-1); ctx.fillRect(-2, -8, 5, 12); ctx.restore();
      ctx.save(); ctx.translate(8, -16); ctx.rotate(1); ctx.fillRect(-2, -8, 5, 12); ctx.restore();
      ctx.beginPath(); ctx.arc(0, -20, 10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-3, -22, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -22, 2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#000'; ctx.beginPath(); ctx.arc(0, -17, 4, 0.2, Math.PI - 0.2); ctx.stroke();
      ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ff8c00'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.ellipse(0, -28, 7, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff4500'; ctx.beginPath(); ctx.arc(2, -31, 4, 0, Math.PI*2); ctx.fill();
    } else {
      // Running
      const legSwing = Math.sin(runFrame * 0.35) * 8;
      const armSwingAmount = Math.sin(runFrame * 0.35) * 6;
      ctx.fillStyle = '#2d5a1e';
      ctx.save(); ctx.translate(-5, 2); ctx.rotate(legSwing * 0.05); ctx.fillRect(-3, -2, 7, 14); ctx.restore();
      ctx.save(); ctx.translate(5, 2); ctx.rotate(-legSwing * 0.05); ctx.fillRect(-3, -2, 7, 14); ctx.restore();
      ctx.fillStyle = '#4a3520';
      ctx.save(); ctx.translate(-5 + legSwing * 0.3, 13); ctx.fillRect(-4, -1, 8, 5); ctx.restore();
      ctx.save(); ctx.translate(5 - legSwing * 0.3, 13); ctx.fillRect(-4, -1, 8, 5); ctx.restore();
      const bg = ctx.createLinearGradient(0, -14, 0, 4);
      bg.addColorStop(0, '#e85d2c'); bg.addColorStop(1, '#8b2500');
      ctx.fillStyle = bg; ctx.beginPath(); ctx.ellipse(0, -5, 9, 13, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#e8b88a';
      ctx.save(); ctx.translate(-8, -10); ctx.rotate(-0.5 + armSwingAmount * 0.08); ctx.fillRect(-2, -2, 5, 11); ctx.restore();
      ctx.save(); ctx.translate(8, -10); ctx.rotate(0.5 - armSwingAmount * 0.08); ctx.fillRect(-2, -2, 5, 11); ctx.restore();
      ctx.beginPath(); ctx.arc(-9 + armSwingAmount * 0.5, -22, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(9 - armSwingAmount * 0.5, -22, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -17, 10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(0, -20, 10, Math.PI, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-3, -17, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -17, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-3, -17, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -17, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#000'; ctx.beginPath(); ctx.arc(0, -12, 3, 0.2, Math.PI - 0.2); ctx.stroke();
      ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ff8c00'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.ellipse(0, -24, 8, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff4500'; ctx.beginPath(); ctx.arc(1, -28, 4.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffe44d'; ctx.beginPath(); ctx.arc(0, -27, 1.5, 0, Math.PI*2); ctx.fill();
    }

    if (activeShield) {
      ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2.5; ctx.shadowColor = '#00bfff'; ctx.shadowBlur = 25;
      ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = 'rgba(0,229,255,0.5)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2); ctx.stroke();
    }
    if (activePowerUp) {
      ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 2; ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 20;
      ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    if (gameState === 'menu') {
      // Menu background
      const sg = ctx.createLinearGradient(0, 0, 0, H);
      sg.addColorStop(0, '#0d1b2a'); sg.addColorStop(0.5, '#1b2838'); sg.addColorStop(1, '#0a0805');
      ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 50; i++) {
        const sx = (i * 137 + 53) % W, sy = (i * 89 + 31) % H;
        const twinkle = Math.sin(Date.now() * 0.002 + i) * 0.4 + 0.6;
        ctx.fillStyle = `rgba(255,240,200,${twinkle})`; ctx.shadowColor = '#fff'; ctx.shadowBlur = twinkle * 3;
        ctx.beginPath(); ctx.arc(sx, sy, 1 + twinkle, 0, Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur = 0;
      return;
    }

    // City sky
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0a0a2e'); skyGrad.addColorStop(0.3, '#1a1a3e');
    skyGrad.addColorStop(0.7, '#2d1a1a'); skyGrad.addColorStop(1, '#0a0505');
    ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

    // Stars
    for (let i = 0; i < 45; i++) {
      const sx = (i * 137 + 53) % W, sy = (i * 89 + 31) % (H * 0.35);
      const twinkle = Math.sin(Date.now() * 0.003 + i) * 0.4 + 0.6;
      ctx.fillStyle = `rgba(255,240,200,${twinkle})`; ctx.shadowColor = '#fff'; ctx.shadowBlur = twinkle * 4;
      ctx.beginPath(); ctx.arc(sx, sy, 1 + twinkle * 0.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Buildings on sides
    const bldgWidth = W * 0.06;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, bldgWidth, H);
    ctx.fillRect(W - bldgWidth, 0, bldgWidth, H);
    
    // Building windows
    for (let k = 0; k < 20; k++) {
      const wy = (k * 45 + Date.now() * 0.15) % (H + 60) - 30;
      ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 4;
      ctx.fillRect(bldgWidth * 0.2, wy, 8, 6);
      ctx.fillRect(bldgWidth * 0.5, wy + 10, 8, 6);
      ctx.fillRect(W - bldgWidth * 0.5, wy + 5, 8, 6);
      ctx.fillRect(W - bldgWidth * 0.8, wy + 15, 8, 6);
    }
    ctx.shadowBlur = 0;

    // Road lanes
    const laneWidth = W * 0.14;
    for (let i = 0; i < lanes.length; i++) {
      const lx = lanes[i];
      const roadGrad = ctx.createLinearGradient(0, 0, 0, H);
      roadGrad.addColorStop(0, '#3a3a3a'); roadGrad.addColorStop(0.3, '#4a4a4a');
      roadGrad.addColorStop(0.6, '#333'); roadGrad.addColorStop(1, '#1a1a1a');
      ctx.fillStyle = roadGrad; ctx.fillRect(lx - laneWidth, 0, laneWidth * 2, H);
      
      // Lane markings
      ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2; ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 6;
      ctx.setLineDash([18, 32]);
      ctx.beginPath(); ctx.moveTo(lx, (Date.now() * 0.35) % 50); ctx.lineTo(lx, H); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur = 0;
      
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(lx - laneWidth, 0); ctx.lineTo(lx - laneWidth, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx + laneWidth, 0); ctx.lineTo(lx + laneWidth, H); ctx.stroke();
    }

    // Particles
    for (let p of particles) {
      ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    // Coins
    for (let coin of coins) {
      if (coin.collected) continue;
      ctx.save(); ctx.translate(coin.x, coin.y);
      const sparkle = Math.sin(coin.sparkle) * 0.3 + 0.7;
      ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 14 * sparkle;
      ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(0, 0, coin.radius, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff8c0'; ctx.beginPath(); ctx.arc(-2, -3, 4 * sparkle, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Shields
    for (let shield of shields) {
      if (shield.collected) continue;
      ctx.save(); ctx.translate(shield.x, shield.y);
      ctx.shadowColor = '#00bfff'; ctx.shadowBlur = 18;
      ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(0, 0, shield.radius, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = 'rgba(0,180,255,0.25)'; ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px "Segoe UI"'; ctx.fillText('🛡️', -11, 5);
      ctx.restore();
    }

    // Power-ups
    for (let pu of powerUps) {
      if (pu.collected) continue;
      ctx.save(); ctx.translate(pu.x, pu.y);
      ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 20;
      ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.arc(0, 0, pu.radius, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 12px "Segoe UI"';
      const icon = pu.type === 'magnet' ? '🧲' : pu.type === 'speedBoost' ? '⚡' : pu.type === 'invincibility' ? '⭐' : '💎';
      ctx.fillText(icon, -8, 5);
      ctx.restore();
    }

    // Draw cars
    for (let obs of obstacles) {
      if (obs.type === 'car') {
        drawCar(obs.x, obs.y, obs.width, obs.height, obs.color, obs.wheelRot);
      }
    }

    // Draw player
    drawHuman(player.x, player.y, player.sliding, player.grounded, player.armSwing, player.runFrame);

    // Game over overlay
    if (gameState === 'gameover') {
      ctx.globalAlpha = 0.9;
      const og = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, Math.max(W, H));
      og.addColorStop(0, '#2d0000'); og.addColorStop(1, '#000');
      ctx.fillStyle = og; ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#ff2200';
      ctx.font = `bold ${Math.min(W/8, 48)}px "Segoe UI"`;
      ctx.textAlign = 'center'; ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 35;
      ctx.fillText('💀 GAME OVER! 💀', W/2, H/2 - 40);
      ctx.fillStyle = '#ffd700'; ctx.font = `bold ${Math.min(W/18, 26)}px "Segoe UI"`; ctx.shadowBlur = 15;
      ctx.fillText(`🏆 Score: ${Math.floor(score)}`, W/2, H/2 + 10);
      ctx.fillText(`👑 Best: ${highScore} | 🚗 Jumped: ${carsJumped}`, W/2, H/2 + 45);
      ctx.fillStyle = '#fff'; ctx.font = `${Math.min(W/22, 20)}px "Segoe UI"`;
      ctx.fillText('Press RESTART or SPACE', W/2, H/2 + 80);
      ctx.shadowBlur = 0;
    }
  }

  function gameLoop() {
    update(); draw();
    gameLoopId = requestAnimationFrame(gameLoop);
  }

  // ============ EVENT LISTENERS ============
  document.getElementById('playButton').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); startGame(); });
  document.getElementById('openSettingsBtn').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); showPanel('settings'); });
  document.getElementById('openAchievementsBtn').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); showPanel('achievements'); });
  document.getElementById('backFromSettings').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); showPanel('menu'); });
  document.getElementById('backFromAchievements').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); showPanel('menu'); });
  document.getElementById('resumeButton').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); resumeGame(); });
  document.getElementById('restartFromPause').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); restartGame(); });
  document.getElementById('quitToMenu').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); quitToMenu(); });
  document.getElementById('restartButton').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); restartGame(); });
  document.getElementById('pauseButton').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); pauseGame(); });
  document.getElementById('soundButton').addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); soundEnabled = !soundEnabled; document.getElementById('soundButton').textContent = soundEnabled ? '🔊' : '🔇'; });
  document.getElementById('toggleSoundBtn').addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); soundEnabled = !soundEnabled; this.textContent = soundEnabled ? 'ON' : 'OFF'; });
  document.getElementById('toggleMusicBtn').addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); musicEnabled = !musicEnabled; this.textContent = musicEnabled ? 'ON' : 'OFF'; if (!musicEnabled) stopMusic(); else if (gameState === 'playing') startMusic(); });
  document.getElementById('toggleEffectsBtn').addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); effectsEnabled = !effectsEnabled; this.textContent = effectsEnabled ? 'ON' : 'OFF'; });

  // Keyboard
  window.addEventListener('keydown', function(e) {
    initAudio();
    if (e.key === ' ' || e.key === 'Spacebar') {
      e.preventDefault();
      if (gameState === 'playing') pauseGame();
      else if (gameState === 'paused') resumeGame();
      else if (gameState === 'gameover') restartGame();
      else if (gameState === 'menu') startGame();
      return;
    }
    if (e.key === 'Escape') { if (gameState === 'playing') pauseGame(); else if (gameState === 'paused') resumeGame(); return; }
    if (e.key === 'r' || e.key === 'R') { if (gameState === 'gameover' || gameState === 'playing') restartGame(); return; }
    if (gameState !== 'playing') return;
    e.preventDefault();
    switch(e.key) {
      case 'ArrowLeft': case 'a': keys.left = true; break;
      case 'ArrowRight': case 'd': keys.right = true; break;
      case 'ArrowUp': case 'w': keys.up = true; break;
      case 'ArrowDown': case 's': keys.down = true; break;
    }
  });

  window.addEventListener('keyup', function(e) {
    if (gameState !== 'playing') return; e.preventDefault();
    switch(e.key) {
      case 'ArrowLeft': case 'a': keys.left = false; break;
      case 'ArrowRight': case 'd': keys.right = false; break;
      case 'ArrowUp': case 'w': keys.up = false; break;
      case 'ArrowDown': case 's':
        keys.down = false;
        if (player.grounded && player.sliding) { player.sliding = false; player.height = player.normalHeight; player.wasSliding = false; }
        break;
    }
  });

  // Touch
  let tx = 0, ty = 0;
  canvas.addEventListener('touchstart', function(e) {
    initAudio(); e.preventDefault();
    if (gameState === 'gameover') { restartGame(); return; }
    if (gameState !== 'playing') return;
    const t = e.touches[0]; tx = t.clientX; ty = t.clientY;
  });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault(); if (gameState !== 'playing') return;
    const t = e.touches[0]; const dx = t.clientX - tx, dy = t.clientY - ty;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 20) {
      if (dx > 0) { keys.right = true; keys.left = false; } else { keys.left = true; keys.right = false; }
      tx = t.clientX;
    } else if (Math.abs(dy) > 20) {
      if (dy < 0) { keys.up = true; keys.down = false; } else { keys.down = true; keys.up = false; }
      ty = t.clientY;
    }
  });
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    keys.left = false; keys.right = false; keys.up = false; keys.down = false;
    if (player.grounded && player.sliding) { player.sliding = false; player.height = player.normalHeight; player.wasSliding = false; }
  });

  window.addEventListener('resize', resizeCanvas);

  // Init
  resizeCanvas(); updateDimensions(); calculateLanes();
  player.x = lanes[1]; player.y = H * 0.72;
  menuHighScore.textContent = highScore;
  updateAchievementsList();
  showPanel('menu');
  gameLoop();

  window.addEventListener('beforeunload', () => { if (gameLoopId) cancelAnimationFrame(gameLoopId); stopMusic(); });
})();
</script>
</body>
</html>
