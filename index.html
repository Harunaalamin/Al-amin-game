<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏃 TEMPLE FURY - Street Chase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #000;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none;
      user-select: none; position: fixed; top: 0; left: 0;
    }
    canvas {
      display: block; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; background: #1a1a2e; touch-action: none;
    }
    .menu-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      z-index: 100; background: rgba(0,0,0,0.75);
    }
    .menu-panel {
      background: rgba(10,10,30,0.95); backdrop-filter: blur(25px);
      border: 2px solid #d4af37; border-radius: 25px; padding: 30px 20px;
      text-align: center; color: #ffd700;
      box-shadow: 0 0 80px rgba(255,140,0,0.6), inset 0 0 40px rgba(255,200,0,0.15);
      min-width: 280px; max-width: 400px; width: 90%;
    }
    .menu-title {
      font-size: 1.8rem; font-weight: 900;
      text-shadow: 0 0 40px #ff8c00, 0 0 80px #ff4500; margin-bottom: 5px; letter-spacing: 3px;
    }
    .menu-subtitle { color: #ffaa33; font-size: 0.8rem; margin-bottom: 18px; letter-spacing: 2px; }
    .menu-btn {
      display: block; width: 100%; padding: 13px 18px; margin: 6px 0;
      border: none; border-radius: 50px; font-size: 1.05rem; font-weight: bold;
      cursor: pointer; letter-spacing: 2px; transition: all 0.2s; text-transform: uppercase;
      position: relative; z-index: 101;
    }
    .btn-play {
      background: linear-gradient(180deg, #ffd700, #e6a817); color: #1a1a1a !important;
      border: 2px solid #ffe44d; box-shadow: 0 0 40px rgba(255,140,0,0.8);
      font-size: 1.2rem !important; padding: 15px 18px !important;
    }
    .btn-play:active { transform: scale(0.95); }
    .btn-settings { background: rgba(255,255,255,0.1); border: 2px solid #8b6914; color: #ffd700 !important; }
    .btn-achievements { background: rgba(100,200,255,0.15); border: 2px solid #0088cc; color: #00d4ff !important; }
    .btn-back { background: rgba(255,255,255,0.08); border: 2px solid #666; color: #ccc !important; margin-top: 12px; }
    .btn-quit { background: rgba(255,50,50,0.15); border: 2px solid #cc0000; color: #ff6666 !important; }
    .high-score { color: #ffaa33; font-size: 1rem; margin-top: 10px; text-shadow: 0 0 15px #ff8c00; }
    .settings-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 4px 0; color: #ddd; }
    .toggle-btn { background: rgba(255,255,255,0.1); border: 2px solid #8b6914; color: #ffd700; padding: 7px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
    .achievement-item { margin: 5px 0; padding: 8px; border-radius: 10px; text-align: left; color: #ccc; font-size: 0.8rem; }
    .achievement-unlocked { background: rgba(0,255,0,0.15); border: 1px solid rgba(0,255,0,0.3); }
    .achievement-locked { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .scrollable { max-height: 45vh; overflow-y: auto; margin: 8px 0; }
    .ui-overlay {
      position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
      z-index: 10; padding: 6px; display: flex; justify-content: space-between;
      align-items: flex-start; flex-wrap: wrap; gap: 5px;
    }
    .hud-item {
      background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); padding: 7px 14px;
      border-radius: 50px; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px;
      pointer-events: auto; color: #ffd700;
    }
    .score-panel { border: 2px solid #d4af37; box-shadow: 0 0 25px rgba(255,140,0,0.7); }
    .speed-panel { background: rgba(200,40,10,0.85); border: 2px solid #ff5733; color: #fff; }
    .combo-panel { background: rgba(150,0,255,0.8); border: 2px solid #cc44ff; color: #fff; display: none; }
    .hud-btn {
      background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border: 2px solid #d4af37;
      color: #ffd700; font-size: 0.9rem; padding: 7px 12px; border-radius: 50px;
      cursor: pointer; pointer-events: auto; font-weight: bold;
    }
    .instructions {
      position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); color: #c9a96b;
      padding: 7px 18px; border-radius: 30px; font-size: 0.7rem; letter-spacing: 1px;
      z-index: 10; pointer-events: none; border: 1px solid #8b6914; white-space: nowrap;
    }
    .achievement-popup {
      position: fixed; top: 70px; right: 10px;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
      border: 2px solid #ffd700; border-radius: 20px; padding: 12px 18px;
      color: #ffd700; font-weight: bold; z-index: 200;
      animation: slideIn 0.5s ease, slideOut 0.5s ease 2.5s forwards;
      pointer-events: none; box-shadow: 0 0 30px rgba(255,200,0,0.6); max-width: 230px;
    }
    @keyframes slideIn { from { transform: translateX(200px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(200px); opacity: 0; } }
    @media (max-width: 600px) {
      .menu-panel { padding: 22px 15px; min-width: 250px; }
      .menu-title { font-size: 1.4rem; }
      .menu-btn { padding: 11px 15px; font-size: 0.95rem; }
      .btn-play { font-size: 1.05rem !important; padding: 13px 15px !important; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div class="menu-overlay" id="mainMenu">
    <div class="menu-panel">
      <div class="menu-title">🏃 TEMPLE FURY</div>
      <div class="menu-subtitle">⚡ Dodge & Jump Over Cars! ⚡</div>
      <button class="menu-btn btn-play" id="playButton">▶ PLAY</button>
      <button class="menu-btn btn-settings" id="openSettingsBtn">⚙ SETTINGS</button>
      <button class="menu-btn btn-achievements" id="openAchievementsBtn">🏆 ACHIEVEMENTS</button>
      <div class="high-score">👑 Best: <span id="menuHighScore">0</span></div>
    </div>
  </div>

  <div class="menu-overlay" id="settingsPanel" style="display:none;">
    <div class="menu-panel">
      <div class="menu-title">⚙ SETTINGS</div>
      <div class="settings-item"><span>🔊 Sound</span><button class="toggle-btn" id="toggleSoundBtn">ON</button></div>
      <div class="settings-item"><span>🎵 Music</span><button class="toggle-btn" id="toggleMusicBtn">ON</button></div>
      <div class="settings-item"><span>✨ Effects</span><button class="toggle-btn" id="toggleEffectsBtn">ON</button></div>
      <button class="menu-btn btn-back" id="backFromSettings">⬅ BACK</button>
    </div>
  </div>

  <div class="menu-overlay" id="achievementsPanel" style="display:none;">
    <div class="menu-panel">
      <div class="menu-title">🏆 ACHIEVEMENTS</div>
      <div class="scrollable" id="achievementsList"></div>
      <button class="menu-btn btn-back" id="backFromAchievements">⬅ BACK</button>
    </div>
  </div>

  <div class="ui-overlay" id="gameHUD" style="display:none;">
    <div class="hud-item score-panel">💰 <span id="scoreDisplay">0</span></div>
    <div class="hud-item speed-panel">⚡ <span id="speedDisplay">1.0x</span></div>
    <div class="hud-item combo-panel" id="comboPanel">🔥 <span id="comboDisplay">x1</span></div>
    <button class="hud-btn" id="pauseButton">⏸</button>
    <button class="hud-btn" id="soundButton">🔊</button>
    <button class="hud-btn" id="restartButton">🔄</button>
  </div>
  <div class="instructions" id="gameInstructions" style="display:none;">
    ⬅️➡️ Switch | ⬆️ JUMP Over Cars | ⬇️ Slide Under | SPACE Pause
  </div>

  <div class="menu-overlay" id="pauseOverlay" style="display:none;">
    <div class="menu-panel">
      <div class="menu-title">⏸ PAUSED</div>
      <button class="menu-btn btn-play" id="resumeButton">▶ RESUME</button>
      <button class="menu-btn btn-settings" id="restartFromPause">🔄 RESTART</button>
      <button class="menu-btn btn-quit" id="quitToMenu">🏠 MENU</button>
    </div>
  </div>

  <div id="achievementPopupContainer"></div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Audio
  let audioCtx = null, soundEnabled = true, musicEnabled = true, effectsEnabled = true;
  let masterGain = null, musicGain = null, sfxGain = null, musicOscillators = [];

  function initAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.gain.value = 0.4; masterGain.connect(audioCtx.destination);
        musicGain = audioCtx.createGain(); musicGain.gain.value = 0.1; musicGain.connect(masterGain);
        sfxGain = audioCtx.createGain(); sfxGain.gain.value = 0.5; sfxGain.connect(masterGain);
      } catch(e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function stopMusic() { musicOscillators.forEach(o => { try { o.stop(); } catch(e) {} }); musicOscillators = []; }
  function startMusic() {
    if (!musicEnabled || !audioCtx) return;
    stopMusic();
    const notes = [130.81, 164.81, 196, 220, 261.63, 329.63, 392];
    let ni = 0;
    function play() {
      if (!musicEnabled || !audioCtx || gameState !== 'playing') return;
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.type = 'triangle'; osc.frequency.value = notes[ni % notes.length];
      gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
      osc.connect(gain); gain.connect(musicGain); osc.start(); osc.stop(audioCtx.currentTime + 0.25);
      musicOscillators.push(osc); ni++;
      if (musicEnabled && gameState === 'playing') setTimeout(play, 220);
    }
    play();
  }

  function playSFX(type) {
    if (!soundEnabled || !effectsEnabled || !audioCtx) return;
    const now = audioCtx.currentTime;
    try {
      let osc, gain;
      if (type === 'jump') {
        osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(250, now);
        osc.frequency.exponentialRampToValueAtTime(700, now + 0.2);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.25);
      } else if (type === 'coin') {
        osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(1000, now);
        osc.frequency.exponentialRampToValueAtTime(1500, now + 0.06);
        gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.1);
      } else if (type === 'death') {
        osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(30, now + 0.6);
        gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.6);
      } else if (type === 'slide') {
        osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(60, now + 0.12);
        gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
        osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.12);
      }
    } catch(e) {}
  }

  let lastFootstepTime = 0;
  function playFootstepSound() {
    if (!soundEnabled || !effectsEnabled || !audioCtx) return;
    const now = audioCtx.currentTime;
    if (now - lastFootstepTime < 0.08) return;
    lastFootstepTime = now;
    try {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.type = 'square'; osc.frequency.setValueAtTime(60, now);
      gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.03);
      osc.connect(gain); gain.connect(sfxGain); osc.start(); osc.stop(now + 0.03);
    } catch(e) {}
  }

  // Game State
  let gameState = 'menu', W, H, lanes, playerLaneIndex = 1;
  
  const player = {
    width: 28, height: 48, x: 0, y: 0,
    velY: 0, grounded: true, sliding: false,
    normalHeight: 48, slideHeight: 22, runFrame: 0, armSwing: 0, wasSliding: false,
    isJumping: false,
  };

  let obstacles = [], coins = [], shields = [], powerUps = [], particles = [];
  let activeShield = false, shieldTimer = 0, activePowerUp = null, powerUpTimer = 0;
  let baseSpeed = 6.0, currentSpeed = 6.0, score = 0, distance = 0, difficultyLevel = 1;
  let comboCount = 0, comboTimer = 0, maxCombo = 0, carsJumped = 0;
  let keys = { left: false, right: false, up: false, down: false };
  let laneCooldown = 0, LANE_COOLDOWN_TIME = 4;
  let achievements = { firstRun: false, coinCollector: false, speedDemon: false, survivor: false, shieldMaster: false, comboKing: false, carJumper: false };
  let highScore = 0, gameLoopId = null;

  try { highScore = parseInt(localStorage.getItem('templeFuryHighScore') || '0'); } catch(e) {}

  const scoreSpan = document.getElementById('scoreDisplay');
  const speedDisplay = document.getElementById('speedDisplay');
  const comboPanel = document.getElementById('comboPanel');
  const comboDisplay = document.getElementById('comboDisplay');
  const menuHighScore = document.getElementById('menuHighScore');

  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function updateDimensions() { W = canvas.width; H = canvas.height; }
  function calculateLanes() { lanes = [W * 0.2, W * 0.5, W * 0.8]; }

  function showAchievement(name, desc) {
    const c = document.getElementById('achievementPopupContainer');
    const p = document.createElement('div'); p.className = 'achievement-popup';
    p.innerHTML = `🏆 <strong>${name}</strong><br><small>${desc}</small>`;
    c.appendChild(p); setTimeout(() => { if (p.parentNode) p.remove(); }, 3000);
  }

  function checkAchievements() {
    if (!achievements.firstRun && score >= 100) { achievements.firstRun = true; showAchievement('First Steps', 'Score 100!'); }
    if (!achievements.coinCollector && score >= 500) { achievements.coinCollector = true; showAchievement('Coin Collector', 'Score 500!'); }
    if (!achievements.speedDemon && currentSpeed >= 12) { achievements.speedDemon = true; showAchievement('Speed Demon', '12x speed!'); }
    if (!achievements.survivor && score >= 2000) { achievements.survivor = true; showAchievement('Survivor', 'Score 2000!'); }
    if (!achievements.shieldMaster && activeShield && shieldTimer > 150) { achievements.shieldMaster = true; showAchievement('Shield Master', '150+ frames!'); }
    if (!achievements.comboKing && maxCombo >= 10) { achievements.comboKing = true; showAchievement('Combo King', '10x combo!'); }
    if (!achievements.carJumper && carsJumped >= 15) { achievements.carJumper = true; showAchievement('Car Jumper', 'Jump 15 cars!'); }
  }

  function updateAchievementsList() {
    const list = document.getElementById('achievementsList');
    if (!list) return;
    const all = [
      { key: 'firstRun', name: 'First Steps', desc: 'Score 100', icon: '🌟' },
      { key: 'coinCollector', name: 'Coin Collector', desc: 'Score 500', icon: '💰' },
      { key: 'speedDemon', name: 'Speed Demon', desc: '12x speed', icon: '⚡' },
      { key: 'survivor', name: 'Survivor', desc: 'Score 2000', icon: '🛡️' },
      { key: 'shieldMaster', name: 'Shield Master', desc: '150+ frames shield', icon: '🔮' },
      { key: 'comboKing', name: 'Combo King', desc: '10x combo', icon: '🔥' },
      { key: 'carJumper', name: 'Car Jumper', desc: 'Jump 15 cars', icon: '🚗' },
    ];
    list.innerHTML = all.map(a =>
      `<div class="achievement-item ${achievements[a.key] ? 'achievement-unlocked' : 'achievement-locked'}">
        ${a.icon} ${achievements[a.key] ? '✅' : '🔒'} <strong>${a.name}</strong> - ${a.desc}
      </div>`
    ).join('');
  }

  function showPanel(p) {
    document.getElementById('mainMenu').style.display = p === 'menu' ? 'flex' : 'none';
    document.getElementById('settingsPanel').style.display = p === 'settings' ? 'flex' : 'none';
    document.getElementById('achievementsPanel').style.display = p === 'achievements' ? 'flex' : 'none';
    document.getElementById('pauseOverlay').style.display = p === 'pause' ? 'flex' : 'none';
    if (p === 'menu') { menuHighScore.textContent = highScore; }
    if (p === 'achievements') updateAchievementsList();
  }

  function startGame() {
    initAudio(); updateDimensions(); calculateLanes();
    playerLaneIndex = 1; player.x = lanes[1]; player.y = H * 0.75;
    player.velY = 0; player.grounded = true; player.sliding = false; player.isJumping = false;
    player.height = player.normalHeight; player.runFrame = 0; player.armSwing = 0; player.wasSliding = false;
    obstacles = []; coins = []; shields = []; powerUps = []; particles = [];
    activeShield = false; shieldTimer = 0; activePowerUp = null; powerUpTimer = 0;
    score = 0; distance = 0; baseSpeed = 6.0; currentSpeed = baseSpeed;
    difficultyLevel = 1; comboCount = 0; comboTimer = 0; maxCombo = 0; carsJumped = 0;
    laneCooldown = 0; keys = { left: false, right: false, up: false, down: false };
    gameState = 'playing';
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('settingsPanel').style.display = 'none';
    document.getElementById('achievementsPanel').style.display = 'none';
    document.getElementById('pauseOverlay').style.display = 'none';
    document.getElementById('gameHUD').style.display = 'flex';
    document.getElementById('gameInstructions').style.display = 'block';
    updateUI(); if (musicEnabled) startMusic();
  }

  function pauseGame() { if (gameState !== 'playing') return; gameState = 'paused'; showPanel('pause'); stopMusic(); }
  function resumeGame() { if (gameState !== 'paused') return; gameState = 'playing'; document.getElementById('pauseOverlay').style.display = 'none'; if (musicEnabled) startMusic(); }
  
  function quitToMenu() {
    gameState = 'menu'; stopMusic();
    document.getElementById('pauseOverlay').style.display = 'none';
    document.getElementById('gameHUD').style.display = 'none';
    document.getElementById('gameInstructions').style.display = 'none';
    showPanel('menu'); updateAchievementsList();
  }

  function restartGame() {
    stopMusic();
    if (score > highScore) { highScore = Math.floor(score); try { localStorage.setItem('templeFuryHighScore', highScore); } catch(e) {} }
    startGame();
  }

  function updateUI() {
    scoreSpan.textContent = Math.floor(score);
    speedDisplay.innerHTML = `⚡ ${(currentSpeed/6.0).toFixed(1)}x ${activeShield?'🛡️':''} ${activePowerUp?'💎':''}`;
    menuHighScore.textContent = highScore;
    comboPanel.style.display = comboCount > 1 ? 'block' : 'none';
    if (comboCount > 1) comboDisplay.textContent = `x${comboCount}`;
  }

  function spawnCar() {
    const availableLanes = [0,1,2].filter(i => !obstacles.some(o => o.lane === i && o.y > -150 && o.y < 120));
    if (availableLanes.length === 0) return;
    const laneIdx = availableLanes[Math.floor(Math.random() * availableLanes.length)];
    const colors = ['#e63946','#1d3557','#2a9d8f','#e9c46a','#f4a261','#264653','#ff6b6b','#4ecdc4'];
    obstacles.push({ lane: laneIdx, x: lanes[laneIdx], y: -90, width: 44, height: 70, type: 'car', color: colors[Math.floor(Math.random()*colors.length)], wheelRot: 0, jumpedOver: false });
  }

  function spawnCoin() {
    const avail = [0,1,2].filter(i => !coins.some(c => c.lane === i && c.y > -60 && c.y < 60));
    if (avail.length === 0) return;
    const li = avail[Math.floor(Math.random()*avail.length)];
    coins.push({ lane: li, x: lanes[li], y: -30, radius: 10, collected: false, sparkle: Math.random()*Math.PI*2 });
  }

  function spawnShield() {
    if (shields.length > 0 || activeShield) return;
    const li = Math.floor(Math.random()*3);
    shields.push({ lane: li, x: lanes[li], y: -40, radius: 13, collected: false });
  }

  function spawnPowerUp() {
    if (powerUps.length > 0 || activePowerUp) return;
    const types = ['magnet','speedBoost','invincibility','doubleScore'];
    const li = Math.floor(Math.random()*3);
    powerUps.push({ lane: li, x: lanes[li], y: -50, radius: 12, collected: false, type: types[Math.floor(Math.random()*types.length)] });
  }

  function addParticles(x, y, color, n=10) {
    for (let i=0; i<n; i++) particles.push({
      x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-3, life: 1, color, size: Math.random()*4+1
    });
  }

  function handleCollision() {
    if (activeShield || activePowerUp === 'invincibility') {
      if (activeShield) { activeShield = false; shieldTimer = 0; addParticles(player.x, player.y, '#00bfff', 15); }
      if (activePowerUp === 'invincibility') { addParticles(player.x, player.y, '#ffff00', 10); }
      obstacles = obstacles.filter(o => { const d = Math.hypot(player.x-o.x, player.y-o.y); return d > 130; });
      comboCount = 0; updateUI(); return;
    }
    gameState = 'gameover'; stopMusic(); playSFX('death'); addParticles(player.x, player.y, '#ff0000', 25);
    if (score > highScore) { highScore = Math.floor(score); try { localStorage.setItem('templeFuryHighScore', highScore); } catch(e) {} }
    updateUI();
  }

  function update() {
    if (gameState !== 'playing') return;
    updateDimensions(); calculateLanes();
    
    distance += currentSpeed;
    if (distance > 280) { baseSpeed = Math.min(baseSpeed + 0.2, 24.0); distance = 0; difficultyLevel = Math.floor(baseSpeed / 1.8); }
    currentSpeed = activePowerUp === 'speedBoost' ? baseSpeed * 1.6 : baseSpeed;

    player.runFrame += currentSpeed * 0.3;
    player.armSwing = Math.sin(player.runFrame * 0.4) * 0.8;

    if (player.grounded && !player.sliding) playFootstepSound();
    if (player.sliding && !player.wasSliding) { playSFX('slide'); addParticles(player.x, player.y, '#fff', 6); }
    player.wasSliding = player.sliding;

    if (comboCount > 1) { comboTimer--; if (comboTimer <= 0) comboCount = 0; }
    if (activePowerUp) { powerUpTimer--; if (powerUpTimer <= 0) activePowerUp = null; }
    if (laneCooldown > 0) laneCooldown--;

    // Lane switching
    if (laneCooldown <= 0) {
      if (keys.left && playerLaneIndex > 0) { playerLaneIndex--; laneCooldown = LANE_COOLDOWN_TIME; keys.left = false; }
      if (keys.right && playerLaneIndex < 2) { playerLaneIndex++; laneCooldown = LANE_COOLDOWN_TIME; keys.right = false; }
    }
    player.x += (lanes[playerLaneIndex] - player.x) * 0.45;

    // ===== DOGON TSALLE (HIGH JUMP) =====
    if (keys.up && player.grounded && !player.sliding) {
      player.velY = -14.5; // Karfin tsalle mai yawa
      player.grounded = false;
      player.isJumping = true;
      playSFX('jump');
      addParticles(player.x, player.y + 10, '#ffffff', 8);
      keys.up = false;
    }

    // Zamewa
    if (keys.down && player.grounded && !player.isJumping) {
      player.sliding = true; player.height = player.slideHeight;
    } else if (!keys.down && player.sliding && player.grounded) {
      player.sliding = false; player.height = player.normalHeight; player.wasSliding = false;
    }

    // Physics na tsalle
    if (!player.grounded) {
      player.velY += 0.55; // Gravity mai sauƙi don tsalle ya yi tsawo
      player.y += player.velY;
      
      // Check if player landed
      if (player.y >= H * 0.75) {
        player.y = H * 0.75;
        player.velY = 0;
        player.grounded = true;
        player.isJumping = false;
        
        // Check if landing on a car
        const plrRect = { x: player.x - player.width/2, y: player.y - player.height, w: player.width, h: player.height };
        for (let obs of obstacles) {
          if (obs.type === 'car') {
            const carRect = { x: obs.x - obs.width/2, y: obs.y - obs.height, w: obs.width, h: obs.height };
            if (plrRect.x < carRect.x + carRect.w && plrRect.x + plrRect.w > carRect.x &&
                plrRect.y < carRect.y + carRect.h && plrRect.y + plrRect.h > carRect.y) {
              // Landed on car - die!
              handleCollision();
              return;
            }
          }
        }
        
        if (keys.down) { player.sliding = true; player.height = player.slideHeight; }
        else { player.sliding = false; player.height = player.normalHeight; }
      }
    }

    if (activeShield) { shieldTimer--; if (shieldTimer <= 0) activeShield = false; }

    // Update particles
    for (let p of particles) { p.x += p.vx; p.y += p.vy; p.life -= 0.04; }
    particles = particles.filter(p => p.life > 0);

    // Move objects
    for (let obs of obstacles) { obs.y += currentSpeed; if (obs.type === 'car') obs.wheelRot += currentSpeed * 0.1; }
    for (let c of coins) { c.y += currentSpeed; c.sparkle += 0.1; }
    for (let s of shields) s.y += currentSpeed;
    for (let pu of powerUps) pu.y += currentSpeed;

    // Spawn
    if (Math.random() < 0.02 * (1 + difficultyLevel * 0.4)) { if (obstacles.length < 4) spawnCar(); }
    if (Math.random() < 0.06 && coins.length < 10) spawnCoin();
    if (Math.random() < 0.004 && !activeShield && shields.length === 0) spawnShield();
    if (Math.random() < 0.002 && powerUps.length === 0 && !activePowerUp) spawnPowerUp();

    // Cleanup
    obstacles = obstacles.filter(o => o.y < H + 150);
    coins = coins.filter(c => c.y < H + 80 && !c.collected);
    shields = shields.filter(s => s.y < H + 80 && !s.collected);
    powerUps = powerUps.filter(p => p.y < H + 80 && !p.collected);

    // ===== COLLISION DETECTION WITH JUMPING =====
    const playerBottom = player.y;
    const playerTop = player.y - player.height;
    
    for (let obs of obstacles) {
      if (obs.type !== 'car') continue;
      
      const carTop = obs.y - obs.height;
      const carBottom = obs.y;
      
      // Check if player is completely ABOVE the car (successful jump)
      if (!player.grounded && playerBottom < carTop - 5 && !obs.jumpedOver) {
        // Player jumped over the car!
        const plrCenterX = player.x;
        const carCenterX = obs.x;
        const carHalfW = obs.width / 2 + player.width / 2;
        
        if (Math.abs(plrCenterX - carCenterX) < carHalfW) {
          obs.jumpedOver = true;
          carsJumped++;
          score += 75;
          comboCount = Math.min(comboCount + 3, 50);
          comboTimer = 70;
          if (comboCount > maxCombo) maxCombo = comboCount;
          playSFX('coin');
          addParticles(player.x, carTop, '#00ff88', 15);
          updateUI();
          continue;
        }
      }
      
      // Check if player is sliding UNDER the car
      if (player.sliding && player.grounded) {
        continue; // Safe - sliding under
      }
      
      // Normal collision - only if not jumping over
      if (!player.isJumping || playerBottom > carTop + 10) {
        const plrRect = { x: player.x - player.width/2, y: playerTop, w: player.width, h: player.height };
        const carRect = { x: obs.x - obs.width/2, y: carTop, w: obs.width, h: obs.height };
        
        // Slightly smaller collision boxes for fairness
        const margin = 5;
        if (plrRect.x + margin < carRect.x + carRect.w - margin &&
            plrRect.x + plrRect.w - margin > carRect.x + margin &&
            plrRect.y + margin < carRect.y + carRect.h - margin &&
            plrRect.y + plrRect.h - margin > carRect.y + margin) {
          handleCollision();
          break;
        }
      }
    }

    // Collect coins
    const magnetRange = activePowerUp === 'magnet' ? 180 : 22;
    for (let coin of coins) {
      if (coin.collected) continue;
      const dist = Math.hypot(player.x - coin.x, (player.y - player.height/2) - coin.y);
      if (dist < 10 + magnetRange) {
        coin.collected = true;
        score += activePowerUp === 'doubleScore' ? 50 : 25;
        comboCount = Math.min(comboCount + 1, 50); comboTimer = 65;
        if (comboCount > maxCombo) maxCombo = comboCount;
        playSFX('coin'); addParticles(coin.x, coin.y, '#ffd700', 4); updateUI();
      }
    }

    // Collect shield
    for (let shield of shields) {
      if (shield.collected) continue;
      if (Math.hypot(player.x - shield.x, (player.y - player.height/2) - shield.y) < shield.radius + 18) {
        shield.collected = true; activeShield = true; shieldTimer = 350;
        addParticles(shield.x, shield.y, '#00bfff', 10); updateUI();
      }
    }

    // Collect power-up
    for (let pu of powerUps) {
      if (pu.collected) continue;
      if (Math.hypot(player.x - pu.x, (player.y - player.height/2) - pu.y) < pu.radius + 18) {
        pu.collected = true; activePowerUp = pu.type; powerUpTimer = 400;
        addParticles(pu.x, pu.y, '#ff00ff', 12); updateUI();
      }
    }

    score += currentSpeed * 0.15;
    checkAchievements();
    updateUI();
  }

  // ============ DRAWING ============
  function drawCar(x, y, w, h, color, wheelRot) {
    ctx.save(); ctx.translate(x, y - h/2);
    ctx.shadowColor = '#000'; ctx.shadowBlur = 15;
    const bg = ctx.createLinearGradient(0, -h/2, 0, h/2);
    bg.addColorStop(0, color); bg.addColorStop(0.6, color); bg.addColorStop(1, '#111');
    ctx.fillStyle = bg; ctx.fillRect(-w/2, -h/2, w, h);
    ctx.fillStyle = '#2a2a2a'; ctx.fillRect(-w/3.5, -h/2 - 14, w*0.6, 20);
    ctx.fillStyle = '#aaddff'; ctx.fillRect(-w/5, -h/2 - 10, w*0.45, 12);
    ctx.fillStyle = '#ffff88'; ctx.shadowColor = '#ff0'; ctx.shadowBlur = 15;
    ctx.fillRect(-w/2+3, h/2-9, 9, 7); ctx.fillRect(w/2-12, h/2-9, 9, 7);
    ctx.fillStyle = '#f33'; ctx.shadowColor = '#f00'; ctx.shadowBlur = 8;
    ctx.fillRect(-w/2+3, -h/2+2, 9, 5); ctx.fillRect(w/2-12, -h/2+2, 9, 5);
    ctx.shadowBlur = 5;
    const wp = [[-w/2+9,-h/2+12],[w/2-9,-h/2+12],[-w/2+9,h/2-12],[w/2-9,h/2-12]];
    for (let [wx,wy] of wp) {
      ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(wx, wy, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(wx, wy, 4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#666'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(wx, wy); ctx.lineTo(wx+Math.cos(wheelRot)*4, wy+Math.sin(wheelRot)*4); ctx.stroke();
    }
    ctx.restore();
  }

  function drawHuman(x, y, sliding, grounded, armSwing, runFrame, isJumping) {
    ctx.save(); ctx.translate(x, y);
    ctx.shadowColor = '#000'; ctx.shadowBlur = 8;

    if (sliding && grounded) {
      ctx.fillStyle = '#e85d2c'; ctx.beginPath(); ctx.ellipse(0, -2, 15, 7, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#e8b88a'; ctx.beginPath(); ctx.arc(-12, -4, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-14, -6, 1.5, 0, Math.PI*2); ctx.fill();
    } else if (!grounded || isJumping) {
      // Jumping animation - tucking legs
      const jumpHeight = Math.abs(player.velY);
      ctx.fillStyle = '#2d5a1e';
      ctx.fillRect(-7, -6, 6, 9); ctx.fillRect(3, -6, 6, 9);
      ctx.fillStyle = '#4a3520'; ctx.fillRect(-8, 1, 7, 5); ctx.fillRect(3, 1, 7, 5);
      const bg2 = ctx.createLinearGradient(0, -16, 0, 0);
      bg2.addColorStop(0, '#e85d2c'); bg2.addColorStop(1, '#8b2500');
      ctx.fillStyle = bg2; ctx.beginPath(); ctx.ellipse(0, -11, 10, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#e8b88a';
      ctx.save(); ctx.translate(-8, -17); ctx.rotate(-1.2); ctx.fillRect(-2, -8, 5, 13); ctx.restore();
      ctx.save(); ctx.translate(8, -17); ctx.rotate(1.2); ctx.fillRect(-2, -8, 5, 13); ctx.restore();
      ctx.fillStyle = '#e8b88a'; ctx.beginPath(); ctx.arc(0, -21, 10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-3, -23, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -23, 2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#000'; ctx.beginPath(); ctx.arc(0, -18, 4, 0.2, Math.PI-0.2); ctx.stroke();
      ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ff8c00'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.ellipse(0, -29, 7, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff4500'; ctx.beginPath(); ctx.arc(2, -32, 4, 0, Math.PI*2); ctx.fill();
    } else {
      const ls = Math.sin(runFrame * 0.35) * 8;
      const aa = Math.sin(runFrame * 0.35) * 6;
      ctx.fillStyle = '#2d5a1e';
      ctx.save(); ctx.translate(-5, 2); ctx.rotate(ls*0.05); ctx.fillRect(-3, -2, 7, 14); ctx.restore();
      ctx.save(); ctx.translate(5, 2); ctx.rotate(-ls*0.05); ctx.fillRect(-3, -2, 7, 14); ctx.restore();
      ctx.fillStyle = '#4a3520';
      ctx.save(); ctx.translate(-5+ls*0.3, 13); ctx.fillRect(-4, -1, 8, 5); ctx.restore();
      ctx.save(); ctx.translate(5-ls*0.3, 13); ctx.fillRect(-4, -1, 8, 5); ctx.restore();
      const bg3 = ctx.createLinearGradient(0, -14, 0, 4);
      bg3.addColorStop(0, '#e85d2c'); bg3.addColorStop(1, '#8b2500');
      ctx.fillStyle = bg3; ctx.beginPath(); ctx.ellipse(0, -5, 9, 13, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#e8b88a';
      ctx.save(); ctx.translate(-8, -10); ctx.rotate(-0.5+aa*0.08); ctx.fillRect(-2, -2, 5, 11); ctx.restore();
      ctx.save(); ctx.translate(8, -10); ctx.rotate(0.5-aa*0.08); ctx.fillRect(-2, -2, 5, 11); ctx.restore();
      ctx.beginPath(); ctx.arc(-9+aa*0.5, -22, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(9-aa*0.5, -22, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#e8b88a'; ctx.beginPath(); ctx.arc(0, -17, 10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(0, -20, 10, Math.PI, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-3, -17, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -17, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-3, -17, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -17, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#000'; ctx.beginPath(); ctx.arc(0, -12, 3, 0.2, Math.PI-0.2); ctx.stroke();
      ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ff8c00'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.ellipse(0, -24, 8, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff4500'; ctx.beginPath(); ctx.arc(1, -28, 4.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffe44d'; ctx.beginPath(); ctx.arc(0, -27, 1.5, 0, Math.PI*2); ctx.fill();
    }

    if (activeShield) {
      ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2.5; ctx.shadowColor = '#00bfff'; ctx.shadowBlur = 25;
      ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI*2); ctx.stroke();
    }
    if (activePowerUp) {
      ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 2; ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 20;
      ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    if (gameState === 'menu') {
      const sg = ctx.createLinearGradient(0, 0, 0, H);
      sg.addColorStop(0, '#0d1b2a'); sg.addColorStop(1, '#0a0805');
      ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);
      for (let i=0; i<50; i++) {
        const sx=(i*137+53)%W, sy=(i*89+31)%H, tw=Math.sin(Date.now()*0.002+i)*0.4+0.6;
        ctx.fillStyle=`rgba(255,240,200,${tw})`; ctx.beginPath(); ctx.arc(sx,sy,1+tw,0,Math.PI*2); ctx.fill();
      }
      return;
    }

    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0a0a2e'); skyGrad.addColorStop(0.3, '#1a1a3e');
    skyGrad.addColorStop(0.7, '#2d1a1a'); skyGrad.addColorStop(1, '#0a0505');
    ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

    for (let i=0; i<45; i++) {
      const sx=(i*137+53)%W, sy=(i*89+31)%(H*0.35), tw=Math.sin(Date.now()*0.003+i)*0.4+0.6;
      ctx.fillStyle=`rgba(255,240,200,${tw})`; ctx.shadowColor='#fff'; ctx.shadowBlur=tw*4;
      ctx.beginPath(); ctx.arc(sx,sy,1+tw*0.5,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;

    const bw=W*0.06;
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,bw,H); ctx.fillRect(W-bw,0,bw,H);
    for (let k=0; k<20; k++) {
      const wy=(k*45+Date.now()*0.15)%(H+60)-30;
      ctx.fillStyle='#ffd700'; ctx.shadowColor='#fa0'; ctx.shadowBlur=4;
      ctx.fillRect(bw*0.2,wy,8,6); ctx.fillRect(bw*0.5,wy+10,8,6);
      ctx.fillRect(W-bw*0.5,wy+5,8,6); ctx.fillRect(W-bw*0.8,wy+15,8,6);
    }
    ctx.shadowBlur=0;

    const lw=W*0.14;
    for (let i=0; i<lanes.length; i++) {
      const lx=lanes[i];
      const rg=ctx.createLinearGradient(0,0,0,H);
      rg.addColorStop(0,'#3a3a3a'); rg.addColorStop(0.3,'#4a4a4a');
      rg.addColorStop(0.6,'#333'); rg.addColorStop(1,'#1a1a1a');
      ctx.fillStyle=rg; ctx.fillRect(lx-lw,0,lw*2,H);
      ctx.strokeStyle='#fc0'; ctx.lineWidth=2; ctx.shadowColor='#f80'; ctx.shadowBlur=6;
      ctx.setLineDash([18,32]); ctx.beginPath(); ctx.moveTo(lx,(Date.now()*0.35)%50); ctx.lineTo(lx,H); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur=0;
      ctx.strokeStyle='#fff'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(lx-lw,0); ctx.lineTo(lx-lw,H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx+lw,0); ctx.lineTo(lx+lw,H); ctx.stroke();
    }

    for (let p of particles) {
      ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    for (let c of coins) {
      if (c.collected) continue;
      ctx.save(); ctx.translate(c.x,c.y);
      const sp=Math.sin(c.sparkle)*0.3+0.7;
      ctx.shadowColor='#ffd700'; ctx.shadowBlur=14*sp;
      ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(0,0,c.radius,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff8c0'; ctx.beginPath(); ctx.arc(-2,-3,4*sp,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    for (let s of shields) {
      if (s.collected) continue;
      ctx.save(); ctx.translate(s.x,s.y);
      ctx.shadowColor='#0bf'; ctx.shadowBlur=18;
      ctx.strokeStyle='#0df'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(0,0,s.radius,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(0,180,255,0.25)'; ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 14px "Segoe UI"'; ctx.fillText('🛡️',-11,5);
      ctx.restore();
    }

    for (let pu of powerUps) {
      if (pu.collected) continue;
      ctx.save(); ctx.translate(pu.x,pu.y);
      ctx.shadowColor='#f0f'; ctx.shadowBlur=20;
      ctx.fillStyle='#f0f'; ctx.beginPath(); ctx.arc(0,0,pu.radius,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 12px "Segoe UI"';
      const icon=pu.type==='magnet'?'🧲':pu.type==='speedBoost'?'⚡':pu.type==='invincibility'?'⭐':'💎';
      ctx.fillText(icon,-8,5);
      ctx.restore();
    }

    for (let obs of obstacles) {
      if (obs.type === 'car') drawCar(obs.x, obs.y, obs.width, obs.height, obs.color, obs.wheelRot);
    }

    drawHuman(player.x, player.y, player.sliding, player.grounded, player.armSwing, player.runFrame, player.isJumping);

    if (gameState === 'gameover') {
      ctx.globalAlpha=0.9;
      const og=ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,Math.max(W,H));
      og.addColorStop(0,'#2d0000'); og.addColorStop(1,'#000');
      ctx.fillStyle=og; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
      ctx.fillStyle='#f20'; ctx.font=`bold ${Math.min(W/8,48)}px "Segoe UI"`;
      ctx.textAlign='center'; ctx.shadowColor='#f00'; ctx.shadowBlur=35;
      ctx.fillText('💀 GAME OVER! 💀',W/2,H/2-40);
      ctx.fillStyle='#fd0'; ctx.font=`bold ${Math.min(W/18,26)}px "Segoe UI"`; ctx.shadowBlur=15;
      ctx.fillText(`🏆 Score: ${Math.floor(score)}`,W/2,H/2+10);
      ctx.fillText(`👑 Best: ${highScore} | 🚗 Jumped: ${carsJumped}`,W/2,H/2+45);
      ctx.fillStyle='#fff'; ctx.font=`${Math.min(W/22,20)}px "Segoe UI"`;
      ctx.fillText('Press RESTART or SPACE',W/2,H/2+80); ctx.shadowBlur=0;
    }
  }

  function gameLoop() { update(); draw(); gameLoopId = requestAnimationFrame(gameLoop); }

  // Event Listeners

  document.getElementById('openSettingsBtn').addEventListener('click', (e) => { e.preventDefault(); showPanel('settings'); });
  document.getElementById('openAchievementsBtn').addEventListener('click', (e) => { e.preventDefault(); showPanel('achievements'); });

  document.getElementById('backFromAchievements').addEventListener('click', (e) => { e.preventDefault(); showPanel('menu'); });

  document.getElementById('restartFromPause').addEventListener('click', (e) => { e.preventDefault(); restartGame(); });
  document.getElementById('quitToMenu').addEventListener('click', (e) => { e.preventDefault(); quitToMenu(); });
  document.getElementById('restartButton').addEventListener('click', (e) => { e.preventDefault(); restartGame(); });
  document.getElementById('pauseButton').addEventListener('click', (e) => { e.preventDefault(); pauseGame(); });
  document.getElementById('soundButton').addEventListener('click', (e) => { e.preventDefault(); soundEnabled=!soundEnabled; document.getElementById('soundButton').textContent=soundEnabled?'🔊':'🔇'; });
  document.getElementById('toggleSoundBtn').addEventListener('click', function(e) { e.preventDefault(); soundEnabled=!soundEnabled; this.textContent=soundEnabled?'ON':'OFF'; });
  document.getElementById('toggleMusicBtn').addEventListener('click', function(e) { e.preventDefault(); musicEnabled=!musicEnabled; this.textContent=musicEnabled?'ON':'OFF'; if(!musicEnabled)stopMusic(); else if(gameState==='playing')startMusic(); });
  document.getElementById('toggleEffectsBtn').addEventListener('click', function(e) { e.preventDefault(); effectsEnabled=!effectsEnabled; this.textContent=effectsEnabled?'ON':'OFF'; });

  window.addEventListener('keydown', function(e) {
    initAudio();
    if (e.key === ' ' || e.key === 'Spacebar') {
      e.preventDefault();
      if (gameState === 'playing') pauseGame();
      else if (gameState === 'paused') resumeGame();
      else if (gameState === 'gameover') restartGame();
      else if (gameState === 'menu') startGame();
      return;
    }
    if (e.key === 'Escape') { if (gameState==='playing') pauseGame(); else if (gameState==='paused') resumeGame(); return; }
    if (e.key==='r'||e.key==='R') { if (gameState==='gameover'||gameState==='playing') restartGame(); return; }
    if (gameState !== 'playing') return;
    e.preventDefault();
    switch(e.key) {
      case 'ArrowLeft': case 'a': case 'A': keys.left=true; break;
      case 'ArrowRight': case 'd': case 'D': keys.right=true; break;
      case 'ArrowUp': case 'w': case 'W': keys.up=true; break;
      case 'ArrowDown': case 's': case 'S': keys.down=true; break;
    }
  });

  window.addEventListener('keyup', function(e) {
    if (gameState !== 'playing') return; e.preventDefault();
    switch(e.key) {
      case 'ArrowLeft': case 'a': case 'A': keys.left=false; break;
      case 'ArrowRight': case 'd': case 'D': keys.right=false; break;
      case 'ArrowUp': case 'w': case 'W': keys.up=false; break;
      case 'ArrowDown': case 's': case 'S':
        keys.down=false;
        if (player.grounded && player.sliding) { player.sliding=false; player.height=player.normalHeight; player.wasSliding=false; }
        break;
    }
  });

  let tx=0, ty=0;
  canvas.addEventListener('touchstart', function(e) {
    initAudio(); e.preventDefault();
    if (gameState==='gameover') { restartGame(); return; }
    if (gameState!=='playing') return;
    const t=e.touches[0]; tx=t.clientX; ty=t.clientY;
  });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault(); if (gameState!=='playing') return;
    const t=e.touches[0]; const dx=t.clientX-tx, dy=t.clientY-ty;
    if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>20) {
      if (dx>0) { keys.right=true; keys.left=false; } else { keys.left=true; keys.right=false; }
      tx=t.clientX;
    } else if (Math.abs(dy)>20) {
      if (dy<0) { keys.up=true; keys.down=false; } else { keys.down=true; keys.up=false; }
      ty=t.clientY;
    }
  });
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    keys.left=false; keys.right=false; keys.up=false; keys.down=false;
    if (player.grounded && player.sliding) { player.sliding=false; player.height=player.normalHeight; player.wasSliding=false; }
  });

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas(); updateDimensions(); calculateLanes();
  player.x=lanes[1]; player.y=H*0.75;
  menuHighScore.textContent=highScore; updateAchievementsList(); showPanel('menu');
  gameLoop();
  window.addEventListener('beforeunload', () => { if (gameLoopId) cancelAnimationFrame(gameLoopId); stopMusic(); });
})();
</script>
</body>
</html>
